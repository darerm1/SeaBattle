name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libboost-thread-dev libsqlite3-dev \
            qt6-base-dev qt6-base-private-dev libqt6widgets6 libqt6network6 xvfb

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build --parallel

    - name: Run tests
      run: cd build && xvfb-run ctest --output-on-failure